<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/invizion.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invizion Platform</title>
  <script>
    // Immediately set the initial theme to prevent flash of wrong theme
    (function () {
      const theme = localStorage.getItem('inviziontenantui-theme') || 'system';
      if (theme === 'system') {
        const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.classList.add(systemTheme);
      } else {
        document.documentElement.classList.add(theme);
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
